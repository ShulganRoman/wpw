services:
  postgres:
    image: postgres:17-alpine
    container_name: wpw-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wpw_db
      POSTGRES_USER: wpw_user
      POSTGRES_PASSWORD: wpw_pass
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    networks:
      - wpw-test-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpw_user -d wpw_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  wpw-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wpw-test-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/media
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wpw_db
      SPRING_DATASOURCE_USERNAME: wpw_user
      SPRING_DATASOURCE_PASSWORD: wpw_pass
      LOGGING_LEVEL_COM_WPW_PIM: DEBUG
    networks:
      - wpw-test-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/api-docs > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  wpw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wpw-test-frontend
    restart: "no"
    volumes:
      - test_frontend_static:/static
    networks:
      - wpw-test-net

  wpw-nginx:
    image: nginx:alpine
    container_name: wpw-test-nginx
    restart: unless-stopped
    depends_on:
      wpw-frontend:
        condition: service_completed_successfully
      wpw-backend:
        condition: service_healthy
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - test_frontend_static:/usr/share/nginx/html:ro
      - ./media:/media:ro
    ports:
      - "8091:80"
    networks:
      - wpw-test-net

networks:
  wpw-test-net:
    driver: bridge

volumes:
  test_postgres_data:
    driver: local
  test_frontend_static:
