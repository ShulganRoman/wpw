spring.application.name=pim

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wpw_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:wpw_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:wpw_pass}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=600s

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# JWT
jwt.secret=${JWT_SECRET:wpw-pim-jwt-secret-key-change-in-production-at-least-64-bytes-long-for-hs512}
jwt.expiration-ms=604800000

# Logging
logging.level.com.wpw.pim=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Media / Photo sync
pim.media.base-path=/media/products
pim.media.base-url=/media/products
pim.export.base-url=https://pim.a2agent.co.il

# Multipart upload
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
# Tomcat: disable connector-level post size cap (default 2MB blocks large multipart uploads)
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
server.tomcat.connection-timeout=120000
